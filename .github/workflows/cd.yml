# CD — Deploy to the home server (RPI5) via a self-hosted runner.
#
# The runner lives ON the RPI5, so deployment is: sync the persistent clone
# and rebuild the compose stack in place. No container registry, no inbound
# ports — the runner polls GitHub outbound.
#
# Prerequisites (one-time setup — see DEPLOY.md):
#   - Docker + compose plugin; runner user in the `docker` group.
#   - A persistent clone at $DEPLOY_DIR with backend/.env (holds secrets).
#   - A self-hosted runner registered with the `astropage` label.
#   - Ports 80 and 443 forwarded from the router to the RPI5.
#   - DNS A record for astropage.onboard.academy → public IP.
name: CD

on:
  # Only deploy after CI passes on main — avoids deploying broken code.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  # Manual trigger from the Actions tab.
  workflow_dispatch:

# Never let two deploys run at once; let the in-flight one finish.
concurrency:
  group: deploy-home
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to RPI5
    # Only run if the triggering CI workflow actually passed (not on failure).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, astropage]
    env:
      DEPLOY_DIR: /opt/astropage

    steps:
      # No actions/checkout — deploy from the persistent clone that holds .env.
      - name: Sync deploy directory to this commit
        run: |
          cd "$DEPLOY_DIR"
          git fetch --prune origin
          git checkout main
          git reset --hard origin/main

      - name: Build and (re)start the stack
        run: |
          cd "$DEPLOY_DIR"
          docker compose up -d --build --remove-orphans

      - name: Wait for backend to be healthy
        run: |
          # Use Python (always available in the container) instead of curl.
          for i in $(seq 1 30); do
            if docker compose -f "$DEPLOY_DIR/docker-compose.yml" exec -T backend \
                python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" \
                >/dev/null 2>&1; then
              echo "backend is up after $((i * 2))s"; exit 0
            fi
            sleep 2
          done
          echo "backend did not come up — recent logs:" >&2
          docker compose -f "$DEPLOY_DIR/docker-compose.yml" logs --tail=50 backend >&2
          exit 1

      - name: Verify HTTPS endpoint is reachable
        run: |
          if curl -fsS https://astropage.onboard.academy/api/health >/dev/null 2>&1; then
            echo "HTTPS endpoint is up"
          else
            echo "Warning: HTTPS endpoint not yet reachable"
          fi

      - name: Prune dangling images
        if: always()
        run: docker image prune -f
