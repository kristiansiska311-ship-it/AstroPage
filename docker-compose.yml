services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-astropage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astropage}
      POSTGRES_DB: ${POSTGRES_DB:-astropage}
    # No host port — DB is internal-only. To access it for maintenance,
    # use: docker compose exec db psql -U astropage
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astropage}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # No host port — backend is internal-only, reached via the nginx proxy.
    # The CD health check runs inside the container with `docker compose exec`.
    env_file: ./backend/.env
    environment:
      # Inside the compose network the database is reachable at host `db`.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-astropage}:${POSTGRES_PASSWORD:-astropage}@db:5432/${POSTGRES_DB:-astropage}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      # Exposed on localhost only — the host nginx proxies to this port.
      - "127.0.0.1:8081:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
