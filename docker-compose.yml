services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-astropage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astropage}
      POSTGRES_DB: ${POSTGRES_DB:-astropage}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astropage}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    env_file: ./backend/.env
    environment:
      # Inside the compose network the database is reachable at host `db`,
      # not `localhost` — override whatever .env sets for local dev.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-astropage}:${POSTGRES_PASSWORD:-astropage}@db:5432/${POSTGRES_DB:-astropage}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
